services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: >
      sh -c "uv sync --frozen --no-dev &&
      uv run python manage.py migrate &&
      uv run python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      API_BASE_URL: http://backend:8000/api
      NUXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend-prod:
    build:
      context: ./backend
      target: prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      DEBUG: "False"
      USE_X_FORWARDED_HOST: "True"
      USE_X_FORWARDED_PROTO: "True"
      SECURE_CONTENT_TYPE_NOSNIFF: "True"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    expose:
      - "8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    profiles:
      - prod

  frontend-prod:
    build:
      context: ./frontend
      target: prod
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      API_BASE_URL: http://backend-prod:8000/api
      NUXT_PUBLIC_API_BASE_URL: /api
      NUXT_PUBLIC_SITE_NAME: ${NUXT_PUBLIC_SITE_NAME:-David Sudi}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    expose:
      - "3000"
    depends_on:
      backend-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    profiles:
      - prod

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/portfolio.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/staticfiles:ro
      - backend_media:/media:ro
    depends_on:
      frontend-prod:
        condition: service_healthy
      backend-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    profiles:
      - prod

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
  backend_static:
  backend_media:
