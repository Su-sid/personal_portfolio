name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Nuxt typecheck
        run: npm run lint

      - name: Production build
        run: npm run build

  compose-validation:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate local Docker Compose
        run: docker compose -f docker-compose.yml config

      - name: Validate Coolify Docker Compose
        run: docker compose -f docker-compose.coolify.yml config

  determine-version:
    name: Determine Version
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
      - compose-validation
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next release tag
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          existing_tag="$(git tag --points-at "$GITHUB_SHA" 'v[0-9]*.[0-9]*.[0-9]*' | head -n 1)"
          if [ -n "$existing_tag" ]; then
            echo "version=$existing_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            next_tag="v0.0.0"
          else
            version_core="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version_core"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$next_tag" >> "$GITHUB_OUTPUT"

  build-backend-image:
    name: Build Backend Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - determine-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive backend image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/personal-portfolio-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ needs.determine-version.outputs.version }}

  build-frontend-image:
    name: Build Frontend Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - determine-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive frontend image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/personal-portfolio-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ needs.determine-version.outputs.version }}

  publish-version-tag:
    name: Publish Version Tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - determine-version
      - build-backend-image
      - build-frontend-image
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push git tag
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - build-backend-image
      - build-frontend-image
      - publish-version-tag
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl --fail --show-error --silent \
            --request GET "${{ secrets.COOLIFY_WEBHOOK }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
