services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-prod:
    image: ${BACKEND_IMAGE:-personal-portfolio-backend:local}
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://portfolio:portfolio@db:5432/portfolio}
      SECRET_KEY: ${SECRET_KEY:-replace-this-secret-before-production}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      USE_X_FORWARDED_HOST: "True"
      USE_X_FORWARDED_PROTO: "True"
      SECURE_CONTENT_TYPE_NOSNIFF: "True"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-True}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-True}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-False}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-False}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      TIME_ZONE: ${TIME_ZONE:-UTC}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
      SITE_OWNER_NAME: ${SITE_OWNER_NAME:-David Sudi}
      SITE_OWNER_TITLE: ${SITE_OWNER_TITLE:-Software Developer}
      SITE_TAGLINE: ${SITE_TAGLINE:-I build web platforms and AI-powered tools that ship business results.}
      SITE_ABOUT: ${SITE_ABOUT:-I design and deliver high-performance digital products, from portfolio-grade websites to automation and machine-learning systems.}
      CALENDLY_URL: ${CALENDLY_URL:-https://calendly.com/davidsudi20/30min}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-}
      WHATSAPP_DEFAULT_TEXT: ${WHATSAPP_DEFAULT_TEXT:-Hi David, I would like to discuss a project.}
      SOCIAL_LINKEDIN_URL: ${SOCIAL_LINKEDIN_URL:-}
      SOCIAL_GITHUB_URL: ${SOCIAL_GITHUB_URL:-}
      SOCIAL_X_URL: ${SOCIAL_X_URL:-}
    expose:
      - "8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  frontend-prod:
    image: ${FRONTEND_IMAGE:-personal-portfolio-frontend:local}
    pull_policy: always
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend-prod:8000/api
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-/api}
      NUXT_PUBLIC_SITE_NAME: ${NUXT_PUBLIC_SITE_NAME:-David Sudi}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    expose:
      - "3000"
    depends_on:
      backend-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./infra/nginx/portfolio.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/staticfiles:ro
      - backend_media:/media:ro
    depends_on:
      frontend-prod:
        condition: service_healthy
      backend-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  backend_static:
  backend_media:
